<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learning TypeScript</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="w-full h-[100vh] flex justify-center items-center">
    <div
      class="w-96 h-52 border border-blue-600 flex flex-col justify-center items-center gap-5"
    >
      <div class="flex flex-col justify-center items-center gap-2">
        <h2 class="text-4xl font-semibold">Counter App</h2>
        <span class="text-2xl" id="counter-display">0</span>
      </div>
      <div class="flex gap-5">
        <button
          class="border p-2 bg-green-400 rounded-xl text-white"
          id="increment-btn"
        >
          Increment
        </button>
        <button
          class="border p-2 bg-red-400 rounded-xl text-white"
          id="decrement-btn"
        >
          Decrement
        </button>
        <button
          class="border p-2 bg-cyan-400 rounded-xl text-white"
          id="reset-btn"
        >
          Reset
        </button>
      </div>
    </div>
    <!-- <script src="/dist/js/literalTypes.js" defer type="module"></script> -->
    <!-- <script src="/dist/js/unionIntersection.js" defer type="module"></script> -->
    <!-- <script src="/dist/js/typeAliases.js" defer type="module"></script> -->
    <!--    <script src="/dist/js/functionTypes.js" defer type="module"></script>-->
    <script src="/dist/js/counterApp.js" defer type="module"></script>
  </body>
</html>
